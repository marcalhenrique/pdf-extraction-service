services:
  postgres:
    image: postgres:16-alpine
    container_name: ${DB_NAME:-pdf_extraction_db}
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-pdf_extraction_db}
    ports:
      - "${DB_PORT:-5431}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pdf-extraction-network
    restart: unless-stopped

  pdf_extraction:
    build: .
    container_name: pdf_extraction_service
    ports:
      - "8503:8503"
    env_file:
      - .env
    environment:
      - TORCH_DEVICE=${TORCH_DEVICE}
      - DB_HOST=pdf_extraction_db
      - DB_PORT=5432
    volumes:
      - ./data/huggingface:/root/.cache/huggingface
      - ./data/logs:/app/log
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy 
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - pdf-extraction-network
    restart: unless-stopped
  
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pdf-extraction-network
    restart: unless-stopped

networks:
  pdf-extraction-network:
    external: true
